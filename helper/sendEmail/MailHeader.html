    <style>
        body {
            background-color: #ff6347;
            padding: 20px;
            margin: 0;

        }


        .content {
            font-size: 16px;
            line-height: 1.6;
        }

        .otp {

        .developer-card {
            display: inline-block;

            border: 4px solid #ffffff;

            margin: 10px 0;
        }

        .developer-role {
            font-size: 28px;

            color: #999999;
            margin-bottom: 5px;
        }

        .developer-name {
            font-size: 25px;
            font-weight: 700;
            color: #ffffff;
        }

        .social-links {
            text-align: center;
            margin-top: 20px;
        }

        .social-link {
            display: inline-block;
            margin: 10px;
            padding: 10px 20px;
            color: #ffffff;
            text-decoration: none;
            border-radius: 5px;
            font-weight: bold;
        }

        .github {
            background-color: #333;
        }

        .instagram {
            background-color: #e1306c;
        }

        .twitter {
            background-color: #1da1f2;
        }

        .linkedin {
            background-color: #0077b5;
        }

        .browser {
            background-color: #ff8c00;
        }

        .dev-title {
            font-size: xx-large;
        }
    </style>
</head>
